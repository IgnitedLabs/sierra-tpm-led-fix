name: CI Validation

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "**" ]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validation checks
        shell: pwsh
        run: ./scripts/validate.ps1
